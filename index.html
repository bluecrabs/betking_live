<!-- 1. Заменяем некорректный скрипт на hls.js -->
<script src="https://unpkg.com"></script>

<script>
    const channels = [
        { id: 1, title: "Шахтар Донецьк", url: "http://57.129.13.212/Test/mono.m3u8" },
        // Для теста я добавлю тот же URL остальным, иначе они не запустятся
        { id: 2, title: "Lobby Stream 02", url: "http://57.129.13.212/Test/mono.m3u8" },
        { id: 3, title: "Table VIP 03", url: "http://57.129.13.212/Test/mono.m3u8" }
        // ... добавьте URL для остальных каналов
    ];

    const container = document.getElementById('streams-container');

    function openFullscreen(id) {
        const video = document.getElementById(id);
        if (video.requestFullscreen) video.requestFullscreen();
        else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        else if (video.msRequestFullscreen) video.msRequestFullscreen();
    }

    channels.forEach(ch => {
        // Проверяем наличие URL, чтобы код не "падал"
        if (!ch.url) return; 

        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
            <div class="video-header">
                <span class="video-title">${ch.title}</span>
                <div class="status-badge"><div class="status-dot"></div> LIVE</div>
            </div>
            <div class="video-wrapper">
                <video id="player-${ch.id}" muted autoplay playsinline controls></video>
                <button class="fs-button" onclick="openFullscreen('player-${ch.id}')">Во весь экран</button>
            </div>
        `;
        container.appendChild(card);

        const video = document.getElementById(`player-${ch.id}`);

        // Инициализация HLS
        if (Hls.isSupported()) {
            const hls = new Hls({ 
                capLevelToPlayerSize: true, 
                maxBufferLength: 5 
            });
            hls.loadSource(ch.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } 
        // Поддержка для Safari (iOS/Mac)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = ch.url;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    });
</script>
